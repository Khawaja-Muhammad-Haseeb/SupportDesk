services:
  postgres:
    image: postgres:16-alpine
    container_name: supportdesk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - supportdesk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./SupportDesk-Backend
    container_name: supportdesk-backend
    restart: unless-stopped
    environment:
      # Backend connects to Postgres by service name (never localhost).
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_HOST: postgres
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      SEED_ON_STARTUP: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - supportdesk

  frontend:
    build: ./SupportDesk-Frontend
    container_name: supportdesk-frontend
    restart: unless-stopped
    environment:
      # Relative base URL; the Vite dev server proxies "/api" to the backend.
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      # Frontend container reaches the backend by service name.
      BACKEND_URL: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - supportdesk

volumes:
  pgdata:

networks:
  supportdesk:
    driver: bridge
